<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const STORAGE_KEY = "poikatsu-app-v1";
const FONT = "'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN','Rounded Mplus 1c',system-ui,sans-serif";
const C = {
  bg: "#F4F6FC", card: "#FFFFFF", ink: "#2A2D4A", sub: "#8C92AC",
  primary: "#5566F0", mint: "#18B69E", sun: "#FFB12E", grape: "#8A5CF6", red: "#F2585B", flame: "#FF6B3D", line: "#E6E9F3",
};
const KID_COLORS = ["#5566F0", "#18B69E", "#8A5CF6", "#FF8A3D", "#2BA8F0", "#F2585B"];
const KID_EMOJIS = ["🐱", "🦖", "🐰", "🐻", "🦊", "🐧", "🦁", "🐸"];
const ONE_DAY = 86400000;

const uid = () => Math.random().toString(36).slice(2, 9);
const fmtDay = (ts) => { const d = new Date(ts); return (d.getMonth() + 1) + "/" + d.getDate(); };
const startOfDay = (ts) => { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); };
const dayKey = (ts) => { const d = new Date(ts); return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); };
const isWeekend = (ts) => { const g = new Date(ts).getDay(); return g === 0 || g === 6; };
const startOfWeek = (ts) => { const d = new Date(startOfDay(ts)); const wd = (d.getDay() + 6) % 7; return startOfDay(d.getTime() - wd * ONE_DAY); };

const earnedOf = (history, id) => history.filter((h) => h.childId === id && h.type === "earn").reduce((s, h) => s + h.amount, 0);
const levelOf = (earned) => Math.floor(earned / 100) + 1;
const rewardById = (data, id) => data.rewards.find((r) => r.id === id) || null;
const goalRewardOf = (data, child) => (child && child.goalRewardId ? rewardById(data, child.goalRewardId) : null);

function ruleOf(task) {
  const r = task.rule || {};
  const type = r.type || "daily";
  return { type, perWeek: Number(r.perWeek) || 3, grace: Number(r.grace) || 0, target: Number(r.target) || (type === "weekly" ? 4 : type === "weekdays" ? 20 : 30) };
}
function ruleSummary(task) {
  const r = ruleOf(task);
  if (r.type === "weekly") return "週" + r.perWeek + "回・" + r.target + "週";
  if (r.type === "weekdays") return "平日・" + r.target + "平日";
  return "毎日・" + r.target + "日" + (r.grace ? "（休" + r.grace + "）" : "");
}

function habitStats(history, childId, task) {
  const rule = ruleOf(task);
  const entries = history.filter((h) => h.childId === childId && h.taskId === task.id && h.type === "earn");
  const set = new Set(entries.map((e) => dayKey(e.ts)));
  const end = startOfDay(Date.now());
  if (rule.type === "weekly") {
    const perWeek = rule.perWeek, target = rule.target;
    const thisWeek = startOfWeek(end);
    const weekCount = (ws) => { let n = 0; for (let i = 0; i < 7; i++) if (set.has(dayKey(ws + i * ONE_DAY))) n++; return n; };
    let earliest = thisWeek;
    if (entries.length) earliest = startOfWeek(Math.min.apply(null, entries.map((e) => e.ts)));
    const weeks = [];
    for (let w = earliest; w <= thisWeek; w += 7 * ONE_DAY) { const n = weekCount(w); weeks.push({ ws: w, count: n, achieved: n >= perWeek }); }
    let longest = 0, run = 0;
    weeks.forEach((wk) => { const isThis = wk.ws === thisWeek; if (wk.achieved) { run++; if (run > longest) longest = run; } else if (!isThis) { run = 0; } });
    return { type: "weekly", perWeek, target, current: run, longest, achieved: longest >= target, doneToday: set.has(dayKey(end)), thisWeekCount: weekCount(thisWeek), recentWeeks: weeks.slice(-6), unit: "週" };
  }
  const weekdaysOnly = rule.type === "weekdays";
  const grace = rule.grace, target = rule.target;
  const required = (t) => (weekdaysOnly ? !isWeekend(t) : true);
  let doneCount = 0, longest = 0, missRun = 0, start = end;
  if (entries.length) start = startOfDay(Math.min.apply(null, entries.map((e) => e.ts)));
  for (let t = start; t <= end - ONE_DAY; t += ONE_DAY) {
    if (!required(t)) continue;
    if (set.has(dayKey(t))) { doneCount++; missRun = 0; if (doneCount > longest) longest = doneCount; }
    else { missRun++; if (missRun > grace) doneCount = 0; }
  }
  const todayDone = set.has(dayKey(end));
  let current = doneCount;
  if (todayDone && required(end)) current = doneCount + 1;
  if (current > longest) longest = current;
  const recent = [];
  for (let i = 34; i >= 0; i--) { const tt = end - i * ONE_DAY; recent.push({ done: set.has(dayKey(tt)), weekend: isWeekend(tt), today: i === 0 }); }
  return { type: weekdaysOnly ? "weekdays" : "daily", target, grace, current, longest, achieved: longest >= target, doneToday: todayDone, recent, unit: weekdaysOnly ? "平日" : "日" };
}

function seedData() {
  const now = Date.now();
  const day = (n) => now - n * ONE_DAY;
  const H = []; let k = 0;
  const add = (childId, type, amount, label, taskId, n) => H.push({ id: "s" + (k++), childId, type, amount, label, taskId, ts: day(n) });
  const addTs = (childId, type, amount, label, taskId, ts) => H.push({ id: "s" + (k++), childId, type, amount, label, taskId, ts });
  for (let i = 0; i < 18; i++) add("c1", "earn", 5, "歯みがき", "t7", i);
  for (let i = 0; i < 8; i++) add("c2", "earn", 5, "歯みがき", "t7", i);
  for (let i = 0; i < 28; i++) if (!isWeekend(day(i))) add("c1", "earn", 10, "宿題をする", "t1", i);
  for (let i = 0; i < 12; i++) if (!isWeekend(day(i))) add("c2", "earn", 10, "宿題をする", "t1", i);
  const mon = startOfWeek(now);
  for (let w = 0; w < 4; w++) [1, 3, 5].forEach((kk) => { const ts = mon - w * 7 * ONE_DAY + kk * ONE_DAY; if (ts <= now) addTs("c1", "earn", 5, "ピアノの練習", "t8", ts); });

  add("c1", "earn", 15, "おふろそうじ", null, 2);
  add("c1", "spend", 20, "すきなおやつ", null, 5);

/* ---------- 自前ラインチャート ---------- */
function LineChartMini({ series, color, height = 210 }) {
  if (!series || series.length < 2) return <p style={{ color: C.sub, textAlign: "center", padding: "30px 0" }}>記録がたまるとグラフが出ます</p>;
  const W = 320, H = height, padL = 30, padR = 10, padT = 12, padB = 22;
  const iw = W - padL - padR, ih = H - padT - padB;
  const max = Math.max.apply(null, series.map((s) => s.total).concat([1]));
  const X = (i) => padL + (series.length === 1 ? 0 : (i / (series.length - 1)) * iw);
  const Y = (v) => padT + ih - (v / max) * ih;
  const line = series.map((s, i) => X(i) + "," + Y(s.total)).join(" ");
  const area = padL + "," + (padT + ih) + " " + line + " " + X(series.length - 1) + "," + (padT + ih);
  const last = series[series.length - 1];
  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", display: "block" }}>
      <line x1={padL} y1={padT} x2={padL} y2={padT + ih} stroke={C.line} />
      <line x1={padL} y1={padT + ih} x2={W - padR} y2={padT + ih} stroke={C.line} />
      <line x1={padL} y1={padT + ih / 2} x2={W - padR} y2={padT + ih / 2} stroke={C.line} strokeDasharray="3 4" />
      <polygon points={area} fill={color} opacity="0.12" />
      <polyline points={line} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={X(series.length - 1)} cy={Y(last.total)} r="4" fill={color} />
      <text x={padL - 4} y={padT + 4} textAnchor="end" fontSize="10" fill={C.sub}>{max}</text>
      <text x={padL - 4} y={padT + ih} textAnchor="end" fontSize="10" fill={C.sub}>0</text>
      <text x={padL} y={H - 6} textAnchor="start" fontSize="10" fill={C.sub}>{series[0].day}</text>
      <text x={W - padR} y={H - 6} textAnchor="end" fontSize="10" fill={C.sub}>{last.day}</text>
    </svg>
  );
}

/* ---------- アプリ本体 ---------- */
function App() {
  const [data, setData] = useState(() => { const d = loadData() || seedData(); if (!d.requests) d.requests = []; return d; });
  const [mode, setMode] = useState("parent");
  const [tab, setTab] = useState("home");
  const [manageSub, setManageSub] = useState("children");
  const [selectedChild, setSelectedChild] = useState(() => (loadData() || seedData()).children[0].id);
  useEffect(() => { saveData(data); }, [data]);

  const childById = (id) => data.children.find((c) => c.id === id);
  const award = (childId, task) => setData((p) => ({ ...p, children: p.children.map((c) => c.id === childId ? { ...c, points: c.points + task.points } : c), history: [...p.history, { id: uid(), childId, type: "earn", amount: task.points, label: task.title, taskId: task.id, ts: Date.now() }] }));
  const redeem = (childId, reward) => setData((p) => ({ ...p, children: p.children.map((c) => c.id === childId ? { ...c, points: c.points - reward.cost, goalRewardId: c.goalRewardId === reward.id ? null : c.goalRewardId } : c), history: [...p.history, { id: uid(), childId, type: "spend", amount: reward.cost, label: reward.title, ts: Date.now() }] }));

  return (
    <div style={{ fontFamily: FONT, background: C.bg, minHeight: "100vh", color: C.ink }}>
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: "calc(96px + env(safe-area-inset-bottom))" }}>
        <Header data={data} mode={mode} setMode={setMode} setTab={setTab} />
        <main style={{ padding: "8px 16px" }}>
          {mode === "parent"
            ? <ParentArea tab={tab} data={data} setData={setData} selectedChild={selectedChild} setSelectedChild={setSelectedChild} award={award} redeem={redeem} childById={childById} setTab={setTab} manageSub={manageSub} setManageSub={setManageSub} />
            : <ChildArea tab={tab} data={data} setData={setData} selectedChild={selectedChild} setSelectedChild={setSelectedChild} childById={childById} />}
        </main>
      </div>
      <BottomNav mode={mode} tab={tab} setTab={setTab} />
    </div>
  );
}

function Header({ data, mode, setMode, setTab }) {
  const [pinOpen, setPinOpen] = useState(false);
  const switchTo = (m) => { if (m === "parent" && data.pin) { setPinOpen(true); return; } setMode(m); setTab("home"); };
  return (
    <header style={{ padding: "calc(16px + env(safe-area-inset-top)) 16px 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Mascot size={40} /><div><div style={{ fontWeight: 800, fontSize: 20, lineHeight: 1 }}>ポイ活ちゃん</div><div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>がんばりをポイントで記録</div></div></div>
      <div style={{ display: "flex", background: "#fff", borderRadius: 999, padding: 3, border: "1px solid " + C.line }}>
        {[["parent", "保護者"], ["child", "こども"]].map((it) => { const m = it[0], label = it[1]; return (<button key={m} onClick={() => (m === mode ? null : switchTo(m))} style={{ border: "none", cursor: "pointer", fontFamily: FONT, padding: "6px 13px", borderRadius: 999, fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", gap: 4, background: mode === m ? C.primary : "transparent", color: mode === m ? "#fff" : C.sub }}>{m === "parent" && (mode === m ? <Icon name="unlock" size={13} color="#fff" /> : (data.pin ? <Icon name="lock" size={13} color={C.sub} /> : null))}{label}</button>); })}
      </div>
      {pinOpen && <PinDialog correct={data.pin} onClose={() => setPinOpen(false)} onOk={() => { setPinOpen(false); setMode("parent"); setTab("home"); }} />}
    </header>
  );
}
function PinDialog({ correct, onOk, onClose }) {
  const [val, setVal] = useState(""); const [err, setErr] = useState(false);
  const submit = () => (val === correct ? onOk() : setErr(true));
  return (
    <Overlay onClose={onClose}>
      <div style={{ textAlign: "center" }}>
        <Icon name="lock" size={28} color={C.primary} /><h3 style={{ margin: "8px 0 4px", fontSize: 18 }}>保護者モードのパスコード</h3>
        <p style={{ color: C.sub, fontSize: 13, margin: 0 }}>4けたの数字を入力してください</p>
        <input value={val} inputMode="numeric" maxLength={4} autoFocus onChange={(e) => { setVal(e.target.value.replace(/\D/g, "")); setErr(false); }} onKeyDown={(e) => e.key === "Enter" && submit()} style={{ marginTop: 14, width: 140, textAlign: "center", letterSpacing: 8, fontSize: 24, padding: "8px 0", borderRadius: 14, fontFamily: FONT, border: "2px solid " + (err ? C.red : C.line), outline: "none" }} />
        {err && <p style={{ color: C.red, fontSize: 12, marginTop: 6 }}>パスコードがちがいます</p>}
        <button onClick={submit} style={btn(C.primary, "100%")}>解除する</button>
      </div>
    </Overlay>
  );
}

function ParentArea(props) {
  const { tab } = props;
  if (tab === "home") return <ParentHome data={props.data} award={props.award} />;
  if (tab === "reward") return <ParentReward data={props.data} redeem={props.redeem} childById={props.childById} selectedChild={props.selectedChild} setSelectedChild={props.setSelectedChild} />;
  if (tab === "goal") return <GoalView data={props.data} setData={props.setData} redeem={props.redeem} editable />;
  if (tab === "chart") return <RecordView data={props.data} selectedChild={props.selectedChild} setSelectedChild={props.setSelectedChild} />;
  if (tab === "manage") return <Manage data={props.data} setData={props.setData} sub={props.manageSub} setSub={props.setManageSub} />;
  return null;
}

                      <button key={t.id} onClick={() => award(c.id, t)} style={taskBtn}>
                        <span style={{ fontSize: 22 }}>{t.emoji}</span><span style={{ fontWeight: 700, fontSize: 13 }}>{t.title}</span>
                        <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ fontSize: 12, color: "#B07400", fontWeight: 800 }}>+{t.points}P</span>{st && <span style={{ fontSize: 11, color: st.achieved ? C.mint : C.flame, fontWeight: 800 }}>{habitMini(st)}</span>}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </Card>
          );
        })}

}

          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {habits.map((t) => { const st = habitStats(data.history, child.id, t); return (<div key={t.id} style={{ display: "flex", alignItems: "center", gap: 5, background: (st.achieved ? C.mint : C.flame) + "14", borderRadius: 999, padding: "6px 12px" }}><span style={{ fontSize: 16 }}>{t.emoji}</span><span style={{ fontWeight: 700, fontSize: 13 }}>{t.title}</span><span style={{ fontWeight: 800, fontSize: 13, color: st.achieved ? C.mint : C.flame }}>{habitChipText(st)}</span></div>); })}

    setData((p) => ({ ...p, requests: [...(p.requests || []), { id: uid(), childId: child.id, title: f.title.trim(), emoji: f.emoji || "🎁", ts: Date.now() }] }));

function RecordView({ data, selectedChild, setSelectedChild, hidePicker }) {
  const child = data.children.find((c) => c.id === selectedChild) || data.children[0];
  const series = useMemo(() => {
    const earns = data.history.filter((h) => h.childId === child.id && h.type === "earn").sort((a, b) => a.ts - b.ts);
    const byDay = {}; let total = 0; earns.forEach((e) => { total += e.amount; byDay[fmtDay(e.ts)] = total; });
    return Object.keys(byDay).map((day) => ({ day, total: byDay[day] }));
  }, [data, child]);
  const totalEarned = series.length ? series[series.length - 1].total : 0;
  const habits = data.tasks.filter((t) => t.isHabit);
  return (
    <React.Fragment>
      <SectionTitle icon={<Icon name="chart" size={18} color={C.mint} />}>がんばりの記録</SectionTitle>
      {!hidePicker && <ChildPicker data={data} selected={child.id} onSelect={setSelectedChild} />}
      <Card style={{ marginTop: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}><span style={{ fontWeight: 800 }}>{child.name} の累計ポイント</span><div style={{ display: "flex", gap: 8, alignItems: "center" }}><LevelBadge earned={totalEarned} /><PointBadge value={totalEarned} small /></div></div>
        <LineChartMini series={series} color={child.color} />
      </Card>
      {habits.length > 0 && (<React.Fragment><SectionTitle icon={<Icon name="flame" size={18} color={C.flame} />}>習慣の記録</SectionTitle><div style={{ display: "grid", gap: 12 }}>{habits.map((t) => <HabitCard key={t.id} data={data} child={child} task={t} />)}</div></React.Fragment>)}
    </React.Fragment>
  );
}

function HabitCard({ data, child, task }) {
  const st = habitStats(data.history, child.id, task);
  if (st.type === "weekly") {
    const wpct = Math.min(100, Math.round((st.thisWeekCount / st.perWeek) * 100));
    return (
      <Card>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 22 }}>{task.emoji}</span><span style={{ fontWeight: 800 }}>{task.title}</span><span style={{ fontSize: 11, color: C.sub }}>週{st.perWeek}回</span></div><FlameBadge label={st.current + "週"} achieved={st.achieved} /></div>
        <div style={{ marginTop: 12, fontSize: 13, fontWeight: 700 }}>今週：{st.thisWeekCount} / {st.perWeek}回</div>
        <div style={{ marginTop: 6, background: C.line, borderRadius: 999, height: 10, overflow: "hidden" }}><div style={{ width: wpct + "%", height: "100%", background: st.thisWeekCount >= st.perWeek ? C.mint : C.flame }} /></div>
        <div style={{ marginTop: 12, display: "flex", gap: 6 }}>{st.recentWeeks.map((wk, i) => (<div key={i} style={{ flex: 1, height: 30, borderRadius: 8, display: "grid", placeItems: "center", background: wk.achieved ? child.color : C.line, color: wk.achieved ? "#fff" : C.sub, fontWeight: 800, fontSize: 12 }}>{wk.count}</div>))}</div>
        <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>数字＝その週にできた回数（色つき＝週{st.perWeek}回 達成）</div>
        {st.achieved ? (<div style={{ marginTop: 10, background: C.mint + "14", borderRadius: 12, padding: "8px 12px", textAlign: "center", color: C.mint, fontWeight: 800 }}>🏅 習慣化できました！（{st.longest}週連続で達成）</div>) : (<div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 12, color: C.sub }}><span>達成 {st.current} / {st.target}週</span><span>習慣化まで あと {Math.max(0, st.target - st.current)}週</span></div>)}
      </Card>
    );
  }
  const pct = Math.min(100, Math.round((st.current / st.target) * 100));
  return (
    <Card>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 22 }}>{task.emoji}</span><span style={{ fontWeight: 800 }}>{task.title}</span><span style={{ fontSize: 11, color: C.sub }}>{st.type === "weekdays" ? "平日" : "毎日"}</span></div><FlameBadge label={st.current + st.unit} achieved={st.achieved} /></div>
      <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 5 }}>
        {st.recent.map((cell, i) => { const off = st.type === "weekdays" && cell.weekend; return (<div key={i} style={{ aspectRatio: "1 / 1", borderRadius: "50%", background: cell.done ? child.color : (off ? "transparent" : C.line), border: cell.today ? "2px solid " + C.ink : (off ? "1px dashed " + C.line : "none"), opacity: cell.done ? 1 : (off ? 0.6 : 0.5) }} />); })}
      </div>
      <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>さいきん5週間（色つき＝できた日・太わく＝今日{st.type === "weekdays" ? "・点線＝土日（お休み）" : ""}）</div>
      {st.achieved ? (<div style={{ marginTop: 10, background: C.mint + "14", borderRadius: 12, padding: "8px 12px", textAlign: "center", color: C.mint, fontWeight: 800 }}>🏅 習慣化できました！（最長 {st.longest}{st.unit}）</div>) : (<React.Fragment><div style={{ marginTop: 10, background: C.line, borderRadius: 999, height: 10, overflow: "hidden" }}><div style={{ width: pct + "%", height: "100%", background: C.flame }} /></div><div style={{ display: "flex", justifyContent: "space-between", marginTop: 5, fontSize: 12, color: C.sub }}><span>連続 {st.current} / {st.target}{st.unit}{st.grace ? "（お休み" + st.grace + "日までOK）" : ""}</span><span>あと {Math.max(0, st.target - st.current)}{st.unit}</span></div></React.Fragment>)}
    </Card>
  );
}

  return (
    <React.Fragment>
      <SectionTitle icon={<Icon name="settings" size={18} color={C.sub} />}>管理</SectionTitle>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>{tabs.map((it) => { const k = it[0], label = it[1], ic = it[2]; const on = sub === k; return (<button key={k} onClick={() => setSub(k)} style={{ ...chip(on ? C.ink : "#fff", on ? "#fff" : C.sub), border: "1px solid " + C.line, display: "flex", gap: 4, alignItems: "center" }}><Icon name={ic} size={13} color={on ? "#fff" : C.sub} />{label}</button>); })}</div>
      {sub === "children" && <ManageChildren data={data} setData={setData} />}
      {sub === "tasks" && <ManageTasks data={data} setData={setData} />}
      {sub === "rewards" && <ManageRewards data={data} setData={setData} />}
      {sub === "security" && <ManageSecurity data={data} setData={setData} />}
    </React.Fragment>
  );
}

function ManageChildren({ data, setData }) {
  const [form, setForm] = useState(null);
  const save = () => { if (!form.name.trim()) return; setData((p) => { const exists = p.children.some((c) => c.id === form.id); const child = { ...form, id: form.id || uid(), points: form.points || 0, goalRewardId: form.goalRewardId || null }; return { ...p, children: exists ? p.children.map((c) => c.id === child.id ? child : c) : [...p.children, child] }; }); setForm(null); };
  const remove = (id) => setData((p) => ({ ...p, children: p.children.filter((c) => c.id !== id) }));
  return (
    <React.Fragment>
      <div style={{ display: "grid", gap: 10 }}>{data.children.map((c) => (<Card key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}><div style={{ display: "flex", alignItems: "center", gap: 10 }}><Avatar child={c} small /><div style={{ fontWeight: 700 }}>{c.name}</div><PointBadge value={c.points} small /></div><div style={{ display: "flex", gap: 6 }}><button onClick={() => setForm({ ...c })} style={iconBtn}><Icon name="pencil" size={15} color={C.ink} /></button><button onClick={() => remove(c.id)} style={iconBtn}><Icon name="trash" size={15} color={C.red} /></button></div></Card>))}</div>
      <button onClick={() => setForm({ name: "", color: KID_COLORS[data.children.length % 6], emoji: KID_EMOJIS[data.children.length % 8], points: 0, goalRewardId: null })} style={{ ...btn(C.primary, "100%"), marginTop: 12, display: "flex", gap: 6, justifyContent: "center" }}><Icon name="plus" size={18} color="#fff" />お子さんを追加</button>
      {form && (
        <Overlay onClose={() => setForm(null)}>
          <h3 style={{ marginTop: 0 }}>お子さんの登録</h3>
          <Label>名前</Label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inputStyle} placeholder="例：みなみ" />
          <Label>マーク</Label><div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{KID_EMOJIS.map((e) => (<button key={e} onClick={() => setForm({ ...form, emoji: e })} style={{ fontSize: 22, padding: 6, borderRadius: 12, border: "2px solid " + (form.emoji === e ? C.primary : C.line), background: "#fff", cursor: "pointer" }}>{e}</button>))}</div>
          <Label>色</Label><div style={{ display: "flex", gap: 8 }}>{KID_COLORS.map((col) => (<button key={col} onClick={() => setForm({ ...form, color: col })} style={{ width: 30, height: 30, borderRadius: "50%", background: col, border: "3px solid " + (form.color === col ? C.ink : "#fff"), cursor: "pointer" }} />))}</div>
          <button onClick={save} style={{ ...btn(C.primary, "100%"), marginTop: 14 }}>保存する</button>
        </Overlay>
      )}
    </React.Fragment>
  );
}

function ListEditor({ items, label, fields, onSave, onDelete, accent, hint, habit }) {
  const [form, setForm] = useState(null);
  const defRule = { type: "daily", target: 30, grace: 0, perWeek: 3 };
  const fr = form && form.rule ? { ...defRule, ...form.rule } : defRule;
  const setRule = (patch) => setForm((f) => ({ ...f, rule: { ...defRule, ...(f.rule || {}), ...patch } }));
  const numField = fields.num;
  return (
    <React.Fragment>
      {hint && <p style={{ fontSize: 13, color: C.sub, margin: "0 2px 10px" }}>{hint}</p>}
      <div style={{ display: "grid", gap: 10 }}>
        {items.map((it) => (
          <Card key={it.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}><span style={{ fontSize: 22 }}>{it.emoji}</span><div style={{ fontWeight: 700 }}>{it.title}</div><PointBadge value={it[numField]} small />{habit && it.isHabit && <Pill color={C.flame}>🔁 {ruleSummary(it)}</Pill>}</div>
            <div style={{ display: "flex", gap: 6 }}><button onClick={() => setForm({ ...it })} style={iconBtn}><Icon name="pencil" size={15} color={C.ink} /></button><button onClick={() => onDelete(it.id)} style={iconBtn}><Icon name="trash" size={15} color={C.red} /></button></div>
          </Card>
        ))}
      </div>
      <button onClick={() => { const init = { title: "", emoji: "⭐", isHabit: false, rule: { ...defRule } }; init[numField] = 10; setForm(init); }} style={{ ...btn(accent, "100%"), marginTop: 12, display: "flex", gap: 6, justifyContent: "center" }}><Icon name="plus" size={18} color="#fff" />{label}を追加</button>
      {form && (
        <Overlay onClose={() => setForm(null)}>
          <h3 style={{ marginTop: 0 }}>{label}の登録</h3>
          <Label>名前</Label><input value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} style={inputStyle} placeholder={fields.placeholder} />
          <Label>マーク（絵文字）</Label><input value={form.emoji} onChange={(e) => setForm({ ...form, emoji: e.target.value.slice(0, 2) })} style={{ ...inputStyle, width: 70, textAlign: "center", fontSize: 22 }} />
          <Label>{fields.numLabel}</Label><input value={form[numField]} inputMode="numeric" onChange={(e) => { const v = e.target.value.replace(/\D/g, ""); setForm((f) => { const nf = { ...f }; nf[numField] = v; return nf; }); }} style={inputStyle} />
          {habit && (
            <React.Fragment>
              <div onClick={() => setForm({ ...form, isHabit: !form.isHabit })} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 16, background: "#F7F8FE", borderRadius: 14, padding: "12px 14px", cursor: "pointer" }}>
                <div><div style={{ fontWeight: 700, fontSize: 14 }}>続ける「習慣」にする</div><div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>続けた記録をとり、習慣化を判定します</div></div><Switch on={!!form.isHabit} />
              </div>
              {form.isHabit && (
                <div style={{ marginTop: 12, background: "#F7F8FE", borderRadius: 14, padding: 12 }}>
                  <Label>続け方のルール</Label>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[["daily", "毎日"], ["weekdays", "平日のみ"], ["weekly", "週に何回"]].map((it) => { const v = it[0], lb = it[1]; return (<button key={v} onClick={() => setRule({ type: v })} style={{ ...chip(fr.type === v ? C.primary : "#fff", fr.type === v ? "#fff" : C.sub), border: "1px solid " + (fr.type === v ? C.primary : C.line), fontSize: 13 }}>{lb}</button>); })}
                  </div>
                  {fr.type === "weekly" ? (
                    <React.Fragment>
                      <Label>週に何回</Label><input value={fr.perWeek} inputMode="numeric" onChange={(e) => setRule({ perWeek: e.target.value.replace(/\D/g, "") })} style={inputStyle} />
                      <Label>何週続いたら習慣化</Label><input value={fr.target} inputMode="numeric" onChange={(e) => setRule({ target: e.target.value.replace(/\D/g, "") })} style={inputStyle} />
                      <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>例：週3回を4週続けられたら「習慣化」。曜日は自由です。</div>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <Label>{fr.type === "weekdays" ? "何平日" : "何日"}連続で習慣化</Label><input value={fr.target} inputMode="numeric" onChange={(e) => setRule({ target: e.target.value.replace(/\D/g, "") })} style={inputStyle} />
                      <Label>お休み許容（◯日までセーフ・0でなし）</Label><input value={fr.grace} inputMode="numeric" onChange={(e) => setRule({ grace: e.target.value.replace(/\D/g, "") })} style={inputStyle} />
                      <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>{fr.type === "weekdays" ? "土日は数えず、平日だけで連続を判定します。" : "毎日が対象です。お休み許容を1にすると、1日空いても連続が途切れません。"}</div>
                    </React.Fragment>
                  )}
                </div>
              )}
            </React.Fragment>
          )}
          <button onClick={() => {
            if (!form.title.trim()) return;
            const out = { ...form, id: form.id || uid() };
            out[numField] = Number(form[numField]) || 5;
            if (habit) { out.isHabit = !!form.isHabit; if (out.isHabit) { const t = fr.type; out.rule = { type: t, target: Number(fr.target) || (t === "weekly" ? 4 : t === "weekdays" ? 20 : 30), grace: Number(fr.grace) || 0, perWeek: Number(fr.perWeek) || 3 }; } else { delete out.rule; } }
            onSave(out); setForm(null);
          }} style={{ ...btn(accent, "100%"), marginTop: 16 }}>保存する</button>
        </Overlay>
      )}
    </React.Fragment>
  );
}

function ManageTasks({ data, setData }) {
  return <ListEditor items={data.tasks} label="お手伝い" accent={C.mint} habit
    hint="お手伝いの内容・ポイントを自由に変えられます。続けたいものは「習慣」にし、内容に合った続け方のルール（毎日／平日のみ／週◯回）を選べます。"
    fields={{ num: "points", numLabel: "もらえるポイント", placeholder: "例：宿題をする" }}
    onSave={(it) => setData((p) => ({ ...p, tasks: p.tasks.some((x) => x.id === it.id) ? p.tasks.map((x) => x.id === it.id ? it : x) : [...p.tasks, it] }))}
    onDelete={(id) => setData((p) => ({ ...p, tasks: p.tasks.filter((x) => x.id !== id) }))} />;
}
function RewardRequests({ data, setData }) {
  const reqs = data.requests || [];
  const [costs, setCosts] = useState({});
  if (!reqs.length) return null;
  const childName = (id) => { const c = data.children.find((x) => x.id === id); return c ? c.name : ""; };
  const approve = (req) => {
    const cost = Number(costs[req.id]) || 0;
    setData((p) => ({ ...p, rewards: [...p.rewards, { id: uid(), title: req.title, emoji: req.emoji, cost }], requests: (p.requests || []).filter((r) => r.id !== req.id) }));
  };
  const reject = (id) => setData((p) => ({ ...p, requests: (p.requests || []).filter((r) => r.id !== id) }));
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 800, fontSize: 14, margin: "0 2px 8px", color: C.grape }}><Icon name="sparkles" size={16} color={C.grape} />お子さんからのリクエスト（{reqs.length}件）</div>
      <div style={{ display: "grid", gap: 10 }}>
        {reqs.map((r) => (
          <Card key={r.id} style={{ border: "1.5px solid " + C.grape }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 22 }}>{r.emoji}</span><div style={{ fontWeight: 700 }}>{r.title}</div><Pill color={C.sun}>{childName(r.childId)}</Pill></div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 10 }}>
              <input value={costs[r.id] || ""} inputMode="numeric" placeholder="必要P" onChange={(e) => setCosts({ ...costs, [r.id]: e.target.value.replace(/\D/g, "") })} style={{ ...inputStyle, flex: 1 }} />
              <button onClick={() => approve(r)} style={chip(C.mint)}>承認</button>
              <button onClick={() => reject(r.id)} style={chip("#EEF0F7", C.sub)}>却下</button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}
function ManageRewards({ data, setData }) {
  return (
    <React.Fragment>
      <RewardRequests data={data} setData={setData} />
      <ListEditor items={data.rewards} label="ごほうび" accent={C.grape}
        hint="ごほうびは安いものから高いものまで自由に登録できます。高いごほうびは「目標」に設定できます。お子さんがリクエストしたごほうびは、上に表示され、必要ポイントを入れて「承認」するとリストに加わります。"
        fields={{ num: "cost", numLabel: "必要なポイント", placeholder: "例：ゲーム30分" }}
        onSave={(it) => setData((p) => ({ ...p, rewards: p.rewards.some((x) => x.id === it.id) ? p.rewards.map((x) => x.id === it.id ? it : x) : [...p.rewards, it] }))}
        onDelete={(id) => setData((p) => ({ ...p, rewards: p.rewards.filter((x) => x.id !== id), children: p.children.map((c) => c.goalRewardId === id ? { ...c, goalRewardId: null } : c) }))} />
    </React.Fragment>
  );
}
function ManageSecurity({ data, setData }) {
  const [pin, setPin] = useState(data.pin);
  return (
    <Card>
      <div style={{ fontWeight: 800, marginBottom: 4 }}>保護者モードのロック</div>
      <p style={{ fontSize: 13, color: C.sub, marginTop: 0 }}>4けたのパスコードを決めると、お子さんが勝手にポイントを変更できなくなります。空にするとロックなしです。</p>
      <input value={pin} inputMode="numeric" maxLength={4} placeholder="例：1234" onChange={(e) => setPin(e.target.value.replace(/\D/g, ""))} style={{ ...inputStyle, letterSpacing: 6, textAlign: "center", fontSize: 20 }} />
      <button onClick={() => setData((p) => ({ ...p, pin }))} style={{ ...btn(C.ink, "100%"), marginTop: 10 }}>{pin ? "パスコードを設定" : "ロックをなしにする"}</button>
    </Card>
  );
}

function RecentHistory({ data, childId, limit }) {
  limit = limit || 5;
  const items = data.history.filter((h) => (childId ? h.childId === childId : true)).sort((a, b) => b.ts - a.ts).slice(0, limit);
  if (!items.length) return null;
  return (
    <React.Fragment>
      <SectionTitle icon={<Icon name="star" size={18} color={C.sun} />}>最近の記録</SectionTitle>
      <div style={{ display: "grid", gap: 8 }}>{items.map((h) => { const child = data.children.find((c) => c.id === h.childId); const earn = h.type === "earn"; return (<div key={h.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff", borderRadius: 14, padding: "10px 14px", border: "1px solid " + C.line }}><div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 18 }}>{child ? child.emoji : ""}</span><div><div style={{ fontWeight: 700, fontSize: 14 }}>{h.label}</div><div style={{ fontSize: 11, color: C.sub }}>{child ? child.name : ""}・{fmtDay(h.ts)}</div></div></div><span style={{ fontWeight: 800, color: earn ? C.mint : C.red }}>{earn ? "+" : "−"}{h.amount}P</span></div>); })}</div>
    </React.Fragment>
  );
}

function BottomNav({ mode, tab, setTab }) {
  const parent = [["home", "ホーム", "home"], ["reward", "ごほうび", "gift"], ["goal", "目標", "target"], ["chart", "記録", "chart"], ["manage", "管理", "settings"]];
  const child = [["home", "ポイント", "home"], ["reward", "ごほうび", "gift"], ["chart", "記録", "chart"]];
  const nav = mode === "parent" ? parent : child;
  return (
    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid " + C.line, display: "flex", justifyContent: "space-around", padding: "8px 4px calc(12px + env(safe-area-inset-bottom))", maxWidth: 480, margin: "0 auto" }}>
      {nav.map((it) => { const k = it[0], label = it[1], ic = it[2]; const on = tab === k; return (<button key={k} onClick={() => setTab(k)} style={{ border: "none", background: "none", cursor: "pointer", fontFamily: FONT, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: on ? C.primary : C.sub, fontWeight: on ? 800 : 600, fontSize: 11, flex: 1 }}><Icon name={ic} size={22} color={on ? C.primary : C.sub} />{label}</button>); })}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>


</body>
</html>
